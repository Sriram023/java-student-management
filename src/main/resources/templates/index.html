<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Smart Student Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f7fc;
        }

        .container-box{
            margin-top:40px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
        }

        h1{
            font-weight:bold;
            margin-bottom:25px;
        }

        .btn-custom{
            background:#0d6efd;
            color:white;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="container-box">

        <h1 class="text-center">Smart Student Management System</h1>

        <form th:action="@{/save}" th:object="${student}" method="post">

            <div class="row mb-3">

                <div class="col">
                    <input type="text" th:field="*{name}" class="form-control" placeholder="Student Name" required>
                </div>

                <div class="col">
                    <input type="text" th:field="*{department}" class="form-control" placeholder="Department" required>
                </div>

            </div>

            <div class="row mb-3">

                <div class="col">
                    <input type="email" th:field="*{email}" class="form-control" placeholder="Email" required>
                </div>

                <div class="col">
                    <input type="number" th:field="*{marks}" class="form-control" placeholder="Marks" required>
                </div>

            </div>

            <button type="submit" class="btn btn-custom">Add Student</button>

        </form>

        <hr>

        <table class="table table-bordered table-hover">

            <thead class="table-dark">

            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Department</th>
                <th>Email</th>
                <th>Marks</th>
                <th>Action</th>
            </tr>

            </thead>

            <tbody>

            <tr th:each="student : ${students}">

                <td th:text="${student.id}"></td>
                <td th:text="${student.name}"></td>
                <td th:text="${student.department}"></td>
                <td th:text="${student.email}"></td>
                <td th:text="${student.marks}"></td>

                <td>
                    <a th:href="@{'/delete/' + ${student.id}}" class="btn btn-danger btn-sm">
                        Delete
                    </a>
                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
